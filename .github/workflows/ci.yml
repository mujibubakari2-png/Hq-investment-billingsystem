name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  # ── Lint & Type-Check ──────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check backend
        run: pnpm --filter backend tsc --noEmit

      - name: Type-check frontend
        run: pnpm --filter frontend tsc --noEmit

  # ── Backend Tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      # Database — CI test database only, no production credentials
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      # Secrets — pulled from GitHub repository secrets (never hardcoded)
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      FIELD_ENCRYPTION_KEY: ${{ secrets.CI_FIELD_ENCRYPTION_KEY }}
      CRON_SECRET: ${{ secrets.CI_CRON_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run backend tests
        working-directory: backend
        run: pnpm run test

  # ── Frontend Tests ─────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --filter frontend test

  # ── Backend Build ──────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-backend]   # Tests must pass before build
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/hq_test
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
      NODE_ENV: production
      FIELD_ENCRYPTION_KEY: ${{ secrets.CI_FIELD_ENCRYPTION_KEY }}
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter backend build

  # ── Frontend Build ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-frontend]  # Tests must pass before build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend build
        env:
          VITE_API_URL: https://placeholder.example.com

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── Deploy to Production (main branch only) ────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # ALL test and build jobs must pass before deployment runs
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4


      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /var/www/Hq-investment-billingsystem

            # Pull latest code
            git pull origin master

            # ── Remove test/dev files from the VPS deployment ─────────────────
            # Tests live in the repo for CI/CD but must NOT be present on the
            # production server. This cleanup runs after every pull.
            echo "Cleaning test and dev artifacts from production server..."
            find . -maxdepth 5 -name "*.test.ts"   -not -path "./node_modules/*" -delete
            find . -maxdepth 5 -name "*.test.tsx"  -not -path "./node_modules/*" -delete
            find . -maxdepth 5 -name "*.spec.ts"   -not -path "./node_modules/*" -delete
            find . -maxdepth 5 -name "jest.setup.ts"  -not -path "./node_modules/*" -delete
            find . -maxdepth 5 -name "jest.config.ts" -not -path "./node_modules/*" -delete
            find . -maxdepth 5 -name "vitest.config.ts" -not -path "./node_modules/*" -delete
            rm -rf backend/src/__tests__
            rm -rf backend/scratch
            rm -f  backend/tenantIsolation.log
            rm -f  backend/test-prisma.ts
            rm -f  backend/dry_run.js
            rm -f  backend/extract-error.js
            rm -f  backend/tmp_tenant_model_audit.py
            rm -f  payments.service.mock.test.ts
            rm -f  frontend/src/pages/webhooks.tenant.route.test.ts
            rm -f  frontend/src/pages/payments.service.mock.test.ts
            echo "Test artifact cleanup complete."

            # Install dependencies
            pnpm install --frozen-lockfile

            # Run DB migrations
            cd backend && pnpm prisma migrate deploy && cd ..

            # Rebuild backend (prisma generate + next build)
            pnpm --filter backend build

            # Build frontend on server
            pnpm --filter frontend build

            # Copy fresh frontend dist to nginx web root
            sudo rm -rf /var/www/html/billing/*
            sudo cp -r frontend/dist/* /var/www/html/billing/

            # Restart backend + landing page with PM2
            pm2 restart ecosystem.config.js --update-env

            # Reload nginx
            sudo nginx -t && sudo nginx -s reload

            echo "✅ Deployment complete"
