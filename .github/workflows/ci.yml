name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

  # ── Manual Re-run Trigger ──────────────────────────────────────────────────
  # Allows re-running specific jobs from the GitHub Actions UI.
  # Go to Actions → CI/CD Pipeline → Run workflow → choose which job to re-run.
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'backend'
        type: choice
        options:
          - all
          - backend
          - frontend
          - landing-page
          - deploy

jobs:
  # ── Lint & Type-Check ──────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.job == 'all' ||
      inputs.job == 'backend' ||
      inputs.job == 'frontend' ||
      inputs.job == 'landing-page' ||
      inputs.job == 'deploy'
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check backend
        run: pnpm --filter backend tsc --noEmit

      - name: Type-check frontend
        run: pnpm --filter frontend tsc --noEmit

      - name: Type-check & Lint landing-page
        run: pnpm --filter landing-page lint

  # ── Backend Tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: >
      always() && !cancelled() &&
      (needs.lint-and-typecheck.result == 'success' || needs.lint-and-typecheck.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'backend' || inputs.job == 'deploy')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      REDIS_URL: redis://localhost:6379/0
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      FIELD_ENCRYPTION_KEY: ${{ secrets.CI_FIELD_ENCRYPTION_KEY }}
      CRON_SECRET: ${{ secrets.CI_CRON_SECRET }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run backend tests
        working-directory: backend
        run: pnpm run test

  # ── Frontend Tests ─────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: >
      always() && !cancelled() &&
      (needs.lint-and-typecheck.result == 'success' || needs.lint-and-typecheck.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'frontend' || inputs.job == 'deploy')
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --filter frontend test

  # ── Backend Build ──────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-backend]
    if: >
      always() && !cancelled() &&
      (needs.lint-and-typecheck.result == 'success' || needs.lint-and-typecheck.result == 'skipped') &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'backend' || inputs.job == 'deploy')
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/hq_test
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
      FIELD_ENCRYPTION_KEY: ${{ secrets.CI_FIELD_ENCRYPTION_KEY }}
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: backend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('backend/**.[jt]s', 'backend/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Build backend
        run: pnpm --filter backend build

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v5
        with:
          name: backend-next
          # Include both .next (Next.js) AND dist/ (compiled PM2 workers).
          # dist/ is in .gitignore so it must be carried via CI artifact;
          # without it, radius-worker and mikrotik-worker have no JS to run.
          path: |
            backend/.next
            backend/dist
          retention-days: 1
          include-hidden-files: true

  # ── Frontend Build ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-frontend]
    if: >
      always() && !cancelled() &&
      (needs.lint-and-typecheck.result == 'success' || needs.lint-and-typecheck.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'frontend' || inputs.job == 'deploy')
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── Landing Page Build ─────────────────────────────────────────────────────
  build-landing-page:
    name: Build Landing Page
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    if: >
      always() && !cancelled() &&
      (needs.lint-and-typecheck.result == 'success' || needs.lint-and-typecheck.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'landing-page' || inputs.job == 'deploy')
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build (Landing Page)
        uses: actions/cache@v5
        with:
          path: landing-page/.next/cache
          key: ${{ runner.os }}-nextjs-landing-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('landing-page/**.[jt]s', 'landing-page/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-landing-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Build landing page
        run: pnpm --filter landing-page build
        env:
          NEXT_PUBLIC_BILLING_SYSTEM_URL: ${{ secrets.NEXT_PUBLIC_BILLING_SYSTEM_URL }}

      - name: Upload landing page build artifact
        uses: actions/upload-artifact@v5
        with:
          name: landing-next
          path: landing-page/.next
          retention-days: 1
          include-hidden-files: true

  # ── Deploy to Production ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-landing-page]
    if: >
      always() && !cancelled() &&
      (needs.build-backend.result == 'success') &&
      (needs.build-frontend.result == 'success') &&
      (needs.build-landing-page.result == 'success') &&
      (
        (github.ref == 'refs/heads/master' && github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch' && inputs.job == 'deploy')
      )
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Download frontend artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Download backend artifact
        uses: actions/download-artifact@v5
        with:
          name: backend-next
          path: backend/.next

      - name: Download landing page artifact
        uses: actions/download-artifact@v5
        with:
          name: landing-next
          path: landing-page/.next

      - name: Create release artifact
        run: |
          tar -czf release.tar.gz \
            --exclude='backend/src' --exclude='frontend/src' --exclude='landing-page/app' \
            --exclude='*.test.ts' --exclude='__tests__' \
            package.json pnpm-workspace.yaml pnpm-lock.yaml ecosystem.config.js nginx-sites deploy.sh \
            backend/package.json backend/.next backend/dist backend/public backend/prisma backend/next.config.mjs backend/scripts \
            frontend/package.json frontend/dist \
            landing-page/package.json landing-page/.next landing-page/public landing-page/next.config.mjs || true

      - name: Copy artifact to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "release.tar.gz"
          target: "/tmp"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          SUDO_PASSWORD: ${{ secrets.DROPLET_PASSWORD }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: SUDO_PASSWORD
          script: |
            set -e
            DEPLOY_DIR="/var/www/Hq-investment-billingsystem"

            echo "Extracting artifacts..."
            tar -xzf /tmp/release.tar.gz -C $DEPLOY_DIR
            rm /tmp/release.tar.gz

            cd $DEPLOY_DIR

            echo "Installing production dependencies..."
            pnpm install --frozen-lockfile --prod

            echo "Applying database migrations..."
            cd backend
            echo "  Applying pending migrations..."
            pnpm prisma migrate deploy
            pnpm prisma generate
            cd ..

            echo "Restarting application servers..."
            pm2 restart ecosystem.config.js --update-env

            echo "Syncing Nginx configurations..."
            echo "$SUDO_PASSWORD" | sudo -S cp nginx-sites/api.yourdomain.com /etc/nginx/sites-available/api.yourdomain.com
            echo "$SUDO_PASSWORD" | sudo -S cp nginx-sites/app.yourdomain.com /etc/nginx/sites-available/app.yourdomain.com
            echo "$SUDO_PASSWORD" | sudo -S cp nginx-sites/yourdomain.com /etc/nginx/sites-available/yourdomain.com
            echo "$SUDO_PASSWORD" | sudo -S nginx -t && echo "$SUDO_PASSWORD" | sudo -S nginx -s reload

            echo "✅ Deployment complete"
