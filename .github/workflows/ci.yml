name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  # ── Lint & Type-Check ──────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check backend
        run: pnpm --filter backend tsc --noEmit

      - name: Type-check frontend
        run: pnpm --filter frontend tsc --noEmit

      - name: Type-check & Lint landing-page
        run: pnpm --filter landing-page lint

  # ── Backend Tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      # Database — CI test database only, no production credentials
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      # Secrets — pulled from GitHub repository secrets (never hardcoded)
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      FIELD_ENCRYPTION_KEY: ${{ secrets.CI_FIELD_ENCRYPTION_KEY }}
      CRON_SECRET: ${{ secrets.CI_CRON_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run backend tests
        working-directory: backend
        run: pnpm run test

  # ── Frontend Tests ─────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --filter frontend test

  # ── Backend Build ──────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-backend]   # Tests must pass before build
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/hq_test
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
      FIELD_ENCRYPTION_KEY: ${{ secrets.CI_FIELD_ENCRYPTION_KEY }}
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: backend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('backend/**.[jt]s', 'backend/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Build backend
        run: pnpm --filter backend build

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-next
          path: backend/.next
          retention-days: 1
          include-hidden-files: true

  # ── Frontend Build ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-frontend]  # Tests must pass before build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend build
        env:
          VITE_API_URL: https://placeholder.example.com

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── Landing Page Build ───────────────────────────────────────────────────────
  build-landing-page:
    name: Build Landing Page
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build (Landing Page)
        uses: actions/cache@v4
        with:
          path: landing-page/.next/cache
          key: ${{ runner.os }}-nextjs-landing-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('landing-page/**.[jt]s', 'landing-page/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-landing-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Build landing page
        run: pnpm --filter landing-page build

      - name: Upload landing page build artifact
        uses: actions/upload-artifact@v4
        with:
          name: landing-next
          path: landing-page/.next
          retention-days: 1
          include-hidden-files: true

  # ── Deploy to Production (main branch only) ────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # ALL test and build jobs must pass before deployment runs
    needs: [build-backend, build-frontend, build-landing-page]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-next
          path: backend/.next

      - name: Download landing page artifact
        uses: actions/download-artifact@v4
        with:
          name: landing-next
          path: landing-page/.next

      - name: Create release artifact
        run: |
          tar -czf release.tar.gz \
            --exclude='backend/src' --exclude='frontend/src' --exclude='landing-page/app' \
            --exclude='*.test.ts' --exclude='__tests__' \
            package.json pnpm-workspace.yaml pnpm-lock.yaml ecosystem.config.js nginx-sites deploy.sh \
            backend/package.json backend/.next backend/public backend/prisma backend/next.config.mjs backend/scripts \
            frontend/package.json frontend/dist \
            landing-page/package.json landing-page/.next landing-page/public landing-page/next.config.mjs || true

      - name: Copy artifact to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "release.tar.gz"
          target: "/tmp"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          SUDO_PASSWORD: ${{ secrets.DROPLET_PASSWORD }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: SUDO_PASSWORD
          script: |
            set -e
            DEPLOY_DIR="/var/www/Hq-investment-billingsystem"
            
            # Extract new release over existing files
            echo "Extracting artifacts..."
            tar -xzf /tmp/release.tar.gz -C $DEPLOY_DIR
            rm /tmp/release.tar.gz
            
            cd $DEPLOY_DIR
            
            # Install production dependencies only (no devDependencies, no build)
            echo "Installing production dependencies..."
            pnpm install --frozen-lockfile --prod
            
            # Run DB migrations & generate client
            echo "Applying database migrations..."
            cd backend
            pnpm prisma migrate deploy
            pnpm prisma generate
            cd ..
            
            # Copy frontend to nginx root
            echo "Deploying frontend static files..."
            echo "$SUDO_PASSWORD" | sudo -S rm -rf /var/www/html/billing/*
            echo "$SUDO_PASSWORD" | sudo -S cp -r frontend/dist/* /var/www/html/billing/
            
            # Restart backend + landing page with PM2
            echo "Restarting application servers..."
            pm2 restart ecosystem.config.js --update-env
            
            # Sync Nginx configuration files from repository to the server
            echo "Syncing Nginx configurations..."
            echo "$SUDO_PASSWORD" | sudo -S cp nginx-sites/api.yourdomain.com /etc/nginx/sites-available/api.yourdomain.com
            echo "$SUDO_PASSWORD" | sudo -S cp nginx-sites/app.yourdomain.com /etc/nginx/sites-available/app.yourdomain.com
            echo "$SUDO_PASSWORD" | sudo -S cp nginx-sites/yourdomain.com /etc/nginx/sites-available/yourdomain.com

            # Reload nginx
            echo "$SUDO_PASSWORD" | sudo -S nginx -t && echo "$SUDO_PASSWORD" | sudo -S nginx -s reload

            echo "✅ Deployment complete"
