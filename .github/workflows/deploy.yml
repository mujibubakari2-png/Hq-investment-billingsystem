name: Deploy to Railway

on:
  push:
    branches: [ master, main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'landing-page/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [ master, main ]

jobs:
  # Deploy Backend Service
  deploy-backend:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'backend/') || github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend to Railway
        uses: railwayapp/railway-deploy-action@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: backend
          environment: production

  # Deploy Frontend Service
  deploy-frontend:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'frontend/') || github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Frontend to Railway
        uses: railwayapp/railway-deploy-action@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: frontend
          environment: production

  # Deploy Landing Page Service
  deploy-landing:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'landing-page/') || github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Landing Page to Railway
        uses: railwayapp/railway-deploy-action@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: landing-page
          environment: production

  # Run Database Migrations (only when backend changes)
  migrate-database:
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: contains(github.event.head_commit.modified, 'backend/') && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Login to Railway
        run: railway login --token ${{ secrets.RAILWAY_TOKEN }}

      - name: Link to project
        run: railway link --project ${{ secrets.RAILWAY_PROJECT_ID }}

      - name: Run Database Migrations
        run: |
          cd backend
          railway run npx prisma migrate deploy

      - name: Seed Database (if needed)
        run: |
          cd backend
          railway run npx prisma db seed
        continue-on-error: true