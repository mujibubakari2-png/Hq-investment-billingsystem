# =============================================================================
# DO-004: docker-compose.prod.yml — HQ Investment ISP Platform
# Production stack: PostgreSQL 16, Redis 7, Backend (Next.js), Frontend (nginx)
# =============================================================================
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Required .env variables (copy from .env.example):
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   REDIS_PASSWORD
#   JWT_SECRET, JWT_REFRESH_SECRET
#   DATABASE_URL (postgres://user:pass@postgres:5432/db)
#   REDIS_URL    (redis://:password@redis:6379)
#   VITE_API_URL (public URL of backend, e.g. https://api.yourdomain.com)
#
# Healthcheck summary:
#   postgres → pg_isready
#   redis    → redis-cli ping
#   backend  → GET /api/health
#   frontend → nginx /health
# =============================================================================

name: hqinvestment

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run custom init SQL (partitioning, extensions) on first start
      - ./backend/prisma/migrations/combined_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432" # bind to loopback only — not exposed externally
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - hq-internal

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hq-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy volatile-lru
        --maxmemory-samples 10
        --save 60 1000
        --appendonly yes
    # M2 FIX: volatile-lru evicts ONLY keys with a TTL set (cache, rate-limit counters).
    # allkeys-lru (previous) would evict ANY key including circuit breaker state,
    # audit DLQ entries, and distributed locks — potentially breaking reliability
    # guarantees and losing unprocessed security events.
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hq-internal

  # ── Backend (Next.js API) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 22-alpine
    image: hqinvestment-backend:latest
    container_name: hq-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      # Use JWT_ACCESS_SECRET (not legacy JWT_SECRET) — backend throws FATAL if missing
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://api.yourdomain.com}
      APP_URL: ${APP_URL:-https://api.yourdomain.com}
      CORS_ORIGIN: ${CORS_ORIGIN}
      # SMS / Payment gateway keys (injected at runtime, not baked into image)
      SMS_API_KEY: ${SMS_API_KEY:-}
      HARAKAPAY_API_KEY: ${HARAKAPAY_API_KEY:-}
      HARAKAPAY_API_SECRET: ${HARAKAPAY_API_SECRET:-}
      HARAKAPAY_API_URL: ${HARAKAPAY_API_URL:-}
      # FIELD_ENCRYPTION_KEY (not ENCRYPTION_KEY) — backend throws FATAL if missing
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PAYMENT_ENVIRONMENT: ${PAYMENT_ENVIRONMENT:-live}
      # M7 FIX: Set to 'false' ONLY if using self-signed PostgreSQL cert.
      # Default is 'true' (validates TLS certificate) for security.
      DATABASE_SSL_REJECT_UNAUTHORIZED: ${DATABASE_SSL_REJECT_UNAUTHORIZED:-true}
    ports:
      - "127.0.0.1:3000:3000"
    # Run as non-root user
    user: "1001:1001"
    # Resource limits prevent one container starving others
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s # give Next.js time to start up
    networks:
      - hq-internal
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Frontend (Vite SPA → nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 22-alpine
        VITE_API_URL: ${VITE_API_URL:-https://api.yourdomain.com}
        VITE_HARAKAPAY_URL: ${VITE_HARAKAPAY_URL:-}
    image: hqinvestment-frontend:latest
    container_name: hq-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:5175:80"
    # Run as non-root user
    user: "101:101"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hq-internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  hq-internal:
    driver: bridge
    internal: false # set to true if you want no external egress from containers

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
