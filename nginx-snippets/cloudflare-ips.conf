# =============================================================================
# /etc/nginx/snippets/cloudflare-ips.conf
# Restrict Nginx to accept connections from Cloudflare IPs only.
# This hides your real VPS IP — direct access returns 403.
#
# Deploy:
#   sudo cp nginx-snippets/cloudflare-ips.conf /etc/nginx/snippets/cloudflare-ips.conf
#
# Usage — add to each server block that should be Cloudflare-only:
#   include /etc/nginx/snippets/cloudflare-ips.conf;
#
# Refresh IPs periodically (Cloudflare rarely changes them):
#   curl -s https://www.cloudflare.com/ips-v4
#   curl -s https://www.cloudflare.com/ips-v6
# Last updated: 2025
# =============================================================================

# ── Cloudflare IPv4 ranges ────────────────────────────────────────────────────
allow 173.245.48.0/20;
allow 103.21.244.0/22;
allow 103.22.200.0/22;
allow 103.31.4.0/22;
allow 141.101.64.0/18;
allow 108.162.192.0/18;
allow 190.93.240.0/20;
allow 188.114.96.0/20;
allow 197.234.240.0/22;
allow 198.41.128.0/17;
allow 162.158.0.0/15;
allow 104.16.0.0/13;
allow 104.24.0.0/14;
allow 172.64.0.0/13;
allow 131.0.72.0/22;

# ── Cloudflare IPv6 ranges ────────────────────────────────────────────────────
allow 2400:cb00::/32;
allow 2606:4700::/32;
allow 2803:f800::/32;
allow 2405:b500::/32;
allow 2405:8100::/32;
allow 2a06:98c0::/29;
allow 2c0f:f248::/32;

# ── Block everything else ─────────────────────────────────────────────────────
# Direct VPS IP access returns 403 — real users must go through Cloudflare
deny all;
