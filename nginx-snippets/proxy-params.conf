# =============================================================================
# /etc/nginx/snippets/proxy-params.conf
# Shared reverse-proxy headers — include in every proxy location block
#
# Deploy:
#   sudo cp nginx-snippets/proxy-params.conf /etc/nginx/snippets/proxy-params.conf
#
# Usage in site config:
#   location /api/ {
#       proxy_pass http://127.0.0.1:3000;
#       include /etc/nginx/snippets/proxy-params.conf;
#   }
# =============================================================================

proxy_http_version 1.1;

# ── WebSocket upgrade support ─────────────────────────────────────────────────
proxy_set_header Upgrade    $http_upgrade;
proxy_set_header Connection 'upgrade';

# ── Forward real client info to Node.js ──────────────────────────────────────
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Forwarded-Port  $server_port;

# ── Bypass cache for WebSocket upgrades ──────────────────────────────────────
proxy_cache_bypass $http_upgrade;

# ── Hide backend version headers from clients ─────────────────────────────────
proxy_hide_header X-Powered-By;
proxy_hide_header Server;
