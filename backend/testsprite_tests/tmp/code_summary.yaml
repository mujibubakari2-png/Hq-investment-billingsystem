version: "2"
type: backend
tech_stack:
  - language: TypeScript
  - framework: Next.js (App Router)
  - database: PostgreSQL (Prisma)
  - authentication: JWT, bcryptjs
  - validation: Custom middleware and validation logic
features:
  - name: User Authentication API
    description: User registration, login, and profile management
    files:
      - src/app/api/auth/register/route.ts
      - src/app/api/auth/login/route.ts
      - src/app/api/auth/me/route.ts
    endpoints:
      - method: POST
        path: /api/auth/register
        description: Register a new user and tenant
        auth_required: false
        response_schema:
          "201": User and tenant object
          "409": Conflict error
      - method: POST
        path: /api/auth/login
        description: Authenticate user and return token
        auth_required: false
        response_schema:
          "200": Token and user object
          "401": Invalid credentials
      - method: GET
        path: /api/auth/me
        description: Get current user profile
        auth_required: true
        response_schema:
          "200": User profile object
  - name: Client Management API
    description: CRUD operations for ISP clients
    files:
      - src/app/api/clients/route.ts
      - src/app/api/clients/[id]/route.ts
    endpoints:
      - method: GET
        path: /api/clients
        description: List clients for the current tenant
        auth_required: true
        response_schema:
          "200": Array of clients
      - method: POST
        path: /api/clients
        description: Create a new client
        auth_required: true
        request_schema:
          body:
            fullName: string
            phone: string
            planId: string
        response_schema:
          "201": Created client object
  - name: Router Management API
    description: CRUD operations for network routers
    files:
      - src/app/api/routers/route.ts
      - src/app/api/routers/[id]/route.ts
    endpoints:
      - method: GET
        path: /api/routers
        description: List routers for the current tenant
        auth_required: true
      - method: POST
        path: /api/routers
        description: Add a new router
        auth_required: true
known_limitations: []
