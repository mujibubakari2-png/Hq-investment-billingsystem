<!DOCTYPE html>
<html lang="sw">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HQINVESTMENT WiFi – Ingia</title>
  <meta name="description" content="Karibu kwenye mtandao wa HQINVESTMENT. Lipa na M-Pesa au ingia kwa akaunti yako.">
  <link rel="icon" href="assets/img/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="assets/img/favicon.ico">
  <style>
    :root {
      --primary:#16a34a;--primary-dark:#15803d;--primary-light:#dcfce7;
      --secondary:#1e293b;--accent:#f59e0b;--bg:#f0fdf4;--card:#ffffff;
      --text:#1e293b;--text-muted:#64748b;--border:#e2e8f0;
      --error:#dc2626;--error-bg:#fef2f2;--success:#16a34a;
      --radius:14px;--radius-sm:8px;--shadow:0 8px 32px rgba(0,0,0,0.13);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-text-size-adjust:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
      background:linear-gradient(145deg,#16a34a 0%,#064e3b 100%);
      min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
      padding:12px;color:var(--text);-webkit-font-smoothing:antialiased;
    }
    @media(min-width:480px){body{align-items:center;padding:20px}}
    .card{
      background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
      width:100%;max-width:440px;overflow:hidden;animation:slideUp .35s ease;
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .card-header{
      background:linear-gradient(135deg,#16a34a,#065f46);padding:24px 20px 20px;
      text-align:center;position:relative;overflow:hidden;
    }
    .card-header::before{
      content:'';position:absolute;top:-40px;right:-40px;
      width:130px;height:130px;background:rgba(255,255,255,0.06);border-radius:50%;
    }
    .logo-wrap{
      width:58px;height:58px;background:rgba(255,255,255,0.18);border-radius:50%;
      display:flex;align-items:center;justify-content:center;margin:0 auto 12px;
      border:2px solid rgba(255,255,255,0.3);backdrop-filter:blur(4px);
    }
    .logo-wrap svg{width:30px;height:30px;fill:#fff}
    .card-header h1{color:#fff;font-size:1.2rem;font-weight:700;letter-spacing:-0.3px}
    .card-header p{color:rgba(255,255,255,0.78);font-size:0.78rem;margin-top:3px}
    @media(min-width:480px){
      .card-header{padding:28px 32px 22px}
      .logo-wrap{width:64px;height:64px}
      .logo-wrap svg{width:34px;height:34px}
      .card-header h1{font-size:1.3rem}
    }
    .card-body{padding:20px 16px}
    @media(min-width:480px){.card-body{padding:28px 32px}}
    .tab-wrap{
      display:flex;gap:8px;margin-bottom:20px;background:var(--bg);
      border-radius:var(--radius-sm);padding:4px;
    }
    .tab-wrap .btn{flex:1;padding:10px 8px;font-size:0.85rem;border-radius:6px;margin:0}
    .field{margin-bottom:16px}
    label{
      display:block;font-size:0.72rem;font-weight:600;color:var(--text-muted);
      text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;
    }
    input[type="text"],input[type="password"],input[type="tel"],select{
      width:100%;padding:13px 14px;border:1.5px solid var(--border);
      border-radius:var(--radius-sm);font-size:1rem;font-family:inherit;
      color:var(--text);background:#f8fafc;transition:border-color .2s,box-shadow .2s;
      outline:none;-webkit-appearance:none;appearance:none;min-height:48px;
    }
    input:focus,select:focus{
      border-color:var(--primary);box-shadow:0 0 0 3px rgba(22,163,74,0.14);background:#fff;
    }
    .btn{
      display:block;width:100%;padding:14px 16px;border:none;border-radius:var(--radius-sm);
      font-size:0.95rem;font-weight:600;cursor:pointer;transition:all .2s;
      text-align:center;text-decoration:none;font-family:inherit;min-height:48px;
      line-height:1.3;-webkit-tap-highlight-color:transparent;
    }
    .btn-primary{
      background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;
      box-shadow:0 2px 10px rgba(22,163,74,0.28);
    }
    .btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
    .btn-primary:active{transform:translateY(0);filter:brightness(0.97)}
    .btn-secondary{
      background:var(--bg);color:var(--primary);border:1.5px solid var(--primary);margin-top:10px;
    }
    .btn-secondary:hover{background:var(--primary-light)}
    .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none!important}
    .alert{
      padding:12px 14px;border-radius:var(--radius-sm);font-size:0.85rem;
      margin-bottom:16px;display:flex;align-items:flex-start;gap:8px;line-height:1.5;
    }
    .alert-error{background:var(--error-bg);color:var(--error);border:1px solid #fecaca}
    .alert-success{background:var(--primary-light);color:var(--primary-dark);border:1px solid #86efac}
    .alert-info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .packages{margin-bottom:18px}
    .packages-title{
      font-size:0.72rem;font-weight:600;color:var(--text-muted);
      text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;
    }
    .pkg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    @media(max-width:340px){.pkg-grid{grid-template-columns:1fr}}
    .pkg-card{
      border:2px solid var(--border);border-radius:var(--radius-sm);
      padding:12px 8px;cursor:pointer;transition:all .2s;background:#f8fafc;
      text-align:center;-webkit-tap-highlight-color:transparent;
    }
    .pkg-card:hover,.pkg-card.selected{
      border-color:var(--primary);background:var(--primary-light);
      box-shadow:0 0 0 2px rgba(22,163,74,0.15);
    }
    .pkg-card input[type="radio"]{display:none}
    .pkg-name{font-weight:700;font-size:0.84rem;color:var(--text)}
    .pkg-speed{font-size:0.71rem;color:var(--text-muted);margin-top:2px}
    .pkg-price{font-size:1.05rem;font-weight:700;color:var(--primary);margin-top:5px}
    .pkg-dur{font-size:0.7rem;color:var(--text-muted);margin-top:2px}
    .progress-wrap{margin:14px 0}
    .progress-bar{height:7px;background:var(--border);border-radius:99px;overflow:hidden}
    .progress-fill{
      height:100%;background:linear-gradient(90deg,#16a34a,#22c55e);
      border-radius:99px;transition:width .5s ease;
    }
    .progress-label{font-size:0.74rem;color:var(--text-muted);text-align:center;margin-top:6px}
    .divider{display:flex;align-items:center;gap:10px;margin:16px 0}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .divider span{font-size:0.74rem;color:var(--text-muted);white-space:nowrap}
    .card-footer{
      background:#f8fafc;border-top:1px solid var(--border);padding:12px 16px;text-align:center;
    }
    .card-footer p{font-size:0.74rem;color:var(--text-muted)}
    .card-footer a{color:var(--primary);text-decoration:none;font-weight:500}
    .card-footer a:hover{text-decoration:underline}
    @media(min-width:480px){.card-footer{padding:14px 32px}}
    .spinner{
      width:18px;height:18px;border:2px solid rgba(255,255,255,0.35);
      border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;
      display:inline-block;vertical-align:middle;margin-right:6px;flex-shrink:0;
    }
    .spinner-green{border-color:rgba(22,163,74,0.25);border-top-color:var(--primary)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}
    .mt-16{margin-top:16px}.mt-18{margin-top:18px}
    .text-center{text-align:center}.d-block{display:block}
  </style>
  <script src="md5.js"></script>
</head>

<body>

  <div class="card">
    <!-- Header -->
    <div class="card-header">
      <div class="logo-wrap">
        <svg viewBox="0 0 24 24">
          <path d="M1 6l11 8 11-8V5L12 13 1 5v1zm0 3v9a1 1 0 001 1h20a1 1 0 001-1V9l-11 8L1 9z" />
        </svg>
      </div>
      <h1>HQINVESTMENT WiFi</h1>
      <p>Lipa kwa M-Pesa au ingia kwa akaunti</p>
    </div>

    <!-- Body -->
    <div class="card-body">

      <!-- Error from MikroTik -->
      $(if error)
      <div class="alert alert-error" id="error-alert">
        <span>⚠</span><span>$(error)</span>
      </div>
      $(endif)

      <!-- Tab switcher -->
      <div class="tab-wrap">
        <button id="tab-login" class="btn btn-primary" onclick="showTab('login')">💳 Lipa / Jiunge</button>
        <button id="tab-account" class="btn btn-secondary" onclick="showTab('account')">🔑 Nina Akaunti</button>
      </div>

      <!-- ══ TAB 1: PAY / REGISTER ══ -->
      <div id="panel-login">

        <!-- Package grid -->
        <div class="packages">
          <div class="packages-title">Chagua Kifurushi</div>
          <div class="pkg-grid" id="pkg-grid">
            <div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text-muted);font-size:.84rem;">
              <span class="spinner spinner-green"></span>
              Inapakia vifurushi…
            </div>
          </div>
        </div>

        <!-- Phone number -->
        <div class="field">
          <label for="phone">Namba ya Simu (M-Pesa)</label>
          <input type="tel" id="phone" name="phone" placeholder="0712345678" autocomplete="tel" inputmode="numeric"
            maxlength="13">
        </div>

        <!-- Hidden fields -->
        <input type="hidden" id="mac" value="$(mac)">
        <input type="hidden" id="selected-pkg-id" value="">
        <input type="hidden" id="chap-id-val" value="$(chap-id)">
        <input type="hidden" id="chap-ch-val" value="$(chap-challenge)">

        <!-- Pay button -->
        <button class="btn btn-primary" id="pay-btn" onclick="startPayment()">
          💳 Lipa Sasa
        </button>

        <!-- Payment status -->
        <div id="payment-status" style="display:none;margin-top:16px;">
          <div class="alert alert-info" id="pay-msg">
            <span class="spinner"></span>
            <span id="pay-msg-text">Subiri kukamilisha malipo…</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar">
              <div class="progress-fill" id="prog" style="width:0%"></div>
            </div>
            <div class="progress-label" id="prog-label">0 / 60 sekunde</div>
          </div>
        </div>

      </div><!-- end panel-login -->

      <!-- ══ TAB 2: EXISTING ACCOUNT ══ -->
      <div id="panel-account" style="display:none;">
        <form method="POST" action="$(link-login-only)" onsubmit="return doLogin(this)">
          <input type="hidden" name="dst" value="$(link-orig)">
          <input type="hidden" name="popup" value="true">
          <input type="hidden" name="chap-id" value="$(chap-id)">
          <input type="hidden" name="chap-challenge" value="$(chap-challenge)">
          <input type="hidden" name="chap-password" id="chap-password" value="">

          <div class="field">
            <label for="username">Jina la Mtumiaji</label>
            <input type="text" id="username" name="username" value="$(username)" placeholder="HS-0712345678"
              autocomplete="username" autofocus>
          </div>

          <div class="field">
            <label for="password">Nywila</label>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
          </div>

          <button type="submit" class="btn btn-primary">🔒 Ingia</button>
        </form>

        <div class="divider"><span>au</span></div>
        <button class="btn btn-secondary" onclick="showTab('login')">💳 Lipa kwa M-Pesa</button>
      </div>

    </div><!-- end card-body -->

    <!-- Footer -->
    <div class="card-footer">
      <p>
        Msaada: <a href="tel:+255000000000">+255 000 000 000</a>
        &nbsp;|&nbsp;
        <a href="tandc.html">Masharti</a>
        &nbsp;|&nbsp;
        <a href="faqs.html">Maswali</a>
      </p>
      <p class="mt-4">&copy; 2025 HQINVESTMENT ISP</p>
    </div>
  </div><!-- end card -->

  <script>
    /* ── API BASE DETECTION ─────────────────────────────────────────────────
       Priority:
       1. URL param  ?server=https://...  (overrides all)
       2. URL param  ?api=https://...
       3. Auto-detect from window.location if served from billing server
       4. Hardcoded placeholder (replaced when zip is downloaded)
       ─────────────────────────────────────────────────────────────────────── */
    var API_BASE = (function () {
      var params = new URLSearchParams(window.location.search);

      // 1-2: URL params
      var fromParam = params.get('server') || params.get('api');
      if (fromParam && fromParam.startsWith('http')) return fromParam.replace(/\/$/, '');

      // 3: If this page is served from the billing server itself (not MikroTik)
      var h = window.location.hostname;
      var isPublicHost = h && h !== 'localhost' && !h.match(/^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[01])\.)/);
      if (isPublicHost) return window.location.protocol + '//' + window.location.host;

      // 4: Hardcoded (replaced by download script / RouterDetailModal)
      return 'BILLING_API_URL';
    })();

    var ROUTER_ID = '';
    var selectedPkg = null;
    var paymentRef = null;
    var pollTimer = null;
    var pollCount = 0;
    var MAX_POLL = 60;

    /* ── URL PARAMS ──────────────────────────────────────── */
    (function () {
      var p = new URLSearchParams(window.location.search);
      ROUTER_ID = p.get('routerId') || p.get('router_id') || '';
    })();

    /* ── CHAP LOGIN ──────────────────────────────────────── */
    function doLogin(form) {
      var id = form['chap-id'].value;
      var pw = form['password'].value;
      var ch = form['chap-challenge'].value;
      if (id && ch && typeof chapPassword === 'function') {
        form['chap-password'].value = chapPassword(id, pw, ch);
        form['password'].value = '';
      }
      return true;
    }

    /* ── TAB SWITCHER ────────────────────────────────────── */
    function showTab(tab) {
      var isLogin = tab === 'login';
      document.getElementById('panel-login').style.display = isLogin ? '' : 'none';
      document.getElementById('panel-account').style.display = isLogin ? 'none' : '';
      document.getElementById('tab-login').className = 'btn ' + (isLogin ? 'btn-primary' : 'btn-secondary');
      document.getElementById('tab-account').className = 'btn ' + (isLogin ? 'btn-secondary' : 'btn-primary');
    }

    /* ── LOAD PACKAGES ───────────────────────────────────── */
    function loadPackages() {
      var url = API_BASE + '/api/hotspot/packages?' +
        (ROUTER_ID ? 'routerId=' + ROUTER_ID : '');
      fetch(url)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var list = data.data || data || [];
          renderPackages(Array.isArray(list) ? list : []);
        })
        .catch(function () {
          document.getElementById('pkg-grid').innerHTML =
            '<div style="grid-column:1/-1;text-align:center;padding:14px;color:var(--error);font-size:.82rem;">' +
            '⚠ Hitilafu ya kupakia vifurushi. Jaribu tena.</div>';
        });
    }

    function renderPackages(list) {
      if (!list || list.length === 0) {
        document.getElementById('pkg-grid').innerHTML =
          '<div style="grid-column:1/-1;text-align:center;padding:14px;color:var(--text-muted);font-size:.82rem;">' +
          'Hakuna vifurushi vilivyopatikana.</div>';
        return;
      }
      var units = { MINUTES: 'Min', HOURS: 'Saa', DAYS: 'Siku', MONTHS: 'Miezi' };
      var html = '';
      list.forEach(function (p, i) {
        var speed = p.downloadSpeed ? (p.downloadSpeed + (p.downloadUnit || 'Mbps')) : '';
        var dur = p.duration + ' ' + (units[p.durationUnit] || p.durationUnit);
        html += '<label class="pkg-card' + (i === 0 ? ' selected' : '') + '" id="pkg-' + p.id +
          '" onclick="selectPkg(\'' + p.id + '\')">' +
          '<input type="radio" name="pkg" value="' + p.id + '"' + (i === 0 ? ' checked' : '') + '>' +
          '<div class="pkg-name">' + escHtml(p.name) + '</div>' +
          (speed ? '<div class="pkg-speed">' + escHtml(speed) + '</div>' : '') +
          '<div class="pkg-price">TSH ' + Number(p.price).toLocaleString() + '</div>' +
          '<div class="pkg-dur">' + escHtml(dur) + '</div>' +
          '</label>';
        if (i === 0) {
          selectedPkg = p;
          document.getElementById('selected-pkg-id').value = p.id;
        }
      });
      document.getElementById('pkg-grid').innerHTML = html;
    }

    function selectPkg(id) {
      document.querySelectorAll('.pkg-card').forEach(function (el) {
        el.classList.remove('selected');
      });
      var el = document.getElementById('pkg-' + id);
      if (el) el.classList.add('selected');
      document.getElementById('selected-pkg-id').value = id;
    }

    /* ── PAYMENT ─────────────────────────────────────────── */
    function startPayment() {
      var phone = document.getElementById('phone').value.trim();
      var pkgId = document.getElementById('selected-pkg-id').value;
      var mac = document.getElementById('mac').value;
      clearAlert();

      if (!phone) { showAlert('Tafadhali ingiza namba ya simu.'); return; }
      if (!pkgId) { showAlert('Tafadhali chagua kifurushi.'); return; }

      var btn = document.getElementById('pay-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Inawasiliana…';

      fetch(API_BASE + '/api/hotspot/purchase', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ packageId: pkgId, phone: phone, macAddress: mac, routerId: ROUTER_ID })
      })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d.reference || d.success) {
            paymentRef = d.reference;
            document.getElementById('payment-status').style.display = '';
            btn.style.display = 'none';
            startPolling();
          } else {
            showAlert(d.message || d.error || 'Imeshindwa kuanzisha malipo.');
            btn.disabled = false;
            btn.innerHTML = '💳 Lipa Sasa';
          }
        })
        .catch(function () {
          showAlert('Hitilafu ya mtandao. Hakikisha uko kwenye WiFi kisha jaribu tena.');
          btn.disabled = false;
          btn.innerHTML = '💳 Lipa Sasa';
        });
    }

    /* ── POLL PAYMENT STATUS ─────────────────────────────── */
    function startPolling() {
      pollCount = 0;
      pollTimer = setInterval(function () {
        pollCount++;
        var pct = Math.min(pollCount / MAX_POLL * 100, 99);
        document.getElementById('prog').style.width = pct + '%';
        document.getElementById('prog-label').textContent = pollCount + ' / ' + MAX_POLL + ' sekunde';

        fetch(API_BASE + '/api/hotspot/status?reference=' + encodeURIComponent(paymentRef))
          .then(function (r) { return r.json(); })
          .then(function (d) {
            if (d.status === 'COMPLETED') {
              clearInterval(pollTimer);
              document.getElementById('prog').style.width = '100%';
              document.getElementById('pay-msg').className = 'alert alert-success';
              document.getElementById('pay-msg-text').textContent = '✅ Malipo yamekamilika! Inakuunganisha…';
              if (d.username) {
                setTimeout(function () {
                  var chapId = document.getElementById('chap-id-val').value;
                  var chapCh = document.getElementById('chap-ch-val').value;
                  var pwd = d.password || d.username;
                  var base = '$(link-login-only)';
                  var dst = '$(link-orig)';
                  var url;
                  if (chapId && chapCh && !chapId.includes('$(')) {
                    url = base + '?username=' + encodeURIComponent(d.username) +
                      '&chap-id=' + encodeURIComponent(chapId) +
                      '&chap-challenge=' + encodeURIComponent(chapCh) +
                      '&chap-password=' + encodeURIComponent(chapPassword(chapId, pwd, chapCh)) +
                      '&dst=' + encodeURIComponent(dst);
                  } else {
                    url = base + '?username=' + encodeURIComponent(d.username) +
                      '&password=' + encodeURIComponent(pwd) +
                      '&dst=' + encodeURIComponent(dst);
                  }
                  window.location.href = url;
                }, 1800);
              }
            } else if (d.status === 'FAILED') {
              clearInterval(pollTimer);
              document.getElementById('payment-status').style.display = 'none';
              var btn = document.getElementById('pay-btn');
              btn.style.display = '';
              btn.disabled = false;
              btn.innerHTML = '💳 Lipa Sasa';
              showAlert('Malipo yameshindwa. Tafadhali jaribu tena.');
            }
          })
          .catch(function () { });

        if (pollCount >= MAX_POLL) {
          clearInterval(pollTimer);
          document.getElementById('pay-msg').className = 'alert alert-error';
          document.getElementById('pay-msg-text').textContent = '⏰ Muda umekwisha. Jaribu tena.';
          var btn = document.getElementById('pay-btn');
          btn.style.display = '';
          btn.disabled = false;
          btn.innerHTML = '💳 Lipa Sasa';
        }
      }, 1000);
    }

    /* ── UTILS ───────────────────────────────────────────── */
    function showAlert(msg) {
      var el = document.getElementById('error-alert');
      if (!el) {
        el = document.createElement('div');
        el.className = 'alert alert-error';
        el.id = 'error-alert';
        document.querySelector('.card-body').prepend(el);
      }
      el.innerHTML = '<span>⚠</span><span>' + escHtml(msg) + '</span>';
      el.style.display = '';
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function clearAlert() {
      var el = document.getElementById('error-alert');
      if (el) el.style.display = 'none';
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* ── INIT ────────────────────────────────────────────── */
    loadPackages();
  </script>
</body>

</html>
