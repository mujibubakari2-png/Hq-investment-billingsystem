<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BILLING_COMPANY_NAME - Account Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, BILLING_PRIMARY_COLOR22, BILLING_ACCENT_COLOR22);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 15px;
    }
    .card {
      background: #fff; width: 100%; max-width: 440px;
      border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, BILLING_PRIMARY_COLOR, BILLING_ACCENT_COLOR);
      padding: 30px 20px; text-align: center; color: #fff;
    }
    .header h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 5px; }
    .header p { font-size: 0.85rem; opacity: 0.9; }
    
    .content { padding: 30px 24px; }
    
    /* Tabs */
    .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
    .tab {
      flex: 1; padding: 10px; text-align: center; border-radius: 12px;
      font-size: 0.85rem; font-weight: 600; text-decoration: none;
      transition: all 0.2s;
    }
    .tab-active { background: BILLING_PRIMARY_COLOR; color: #fff; }
    .tab-inactive { background: #f1f5f9; color: #64748b; }
    
    /* Form */
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 0.75rem; color: #666; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; }
    input {
      width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px;
      font-size: 1rem; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: BILLING_PRIMARY_COLOR; }
    
    .btn-login {
      display: block; width: 100%; padding: 14px; background: BILLING_PRIMARY_COLOR;
      color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: all 0.2s; margin-top: 10px;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    
    .alert {
      background: #fee2e2; color: #ef4444; padding: 12px; border-radius: 10px;
      font-size: 0.85rem; margin-bottom: 20px; text-align: center; border: 1px solid #fca5a5;
    }
    
    .footer {
      text-align: center; padding: 20px; font-size: 0.75rem; color: #94a3b8;
      border-top: 1px solid #f1f5f9;
    }
    .footer a { color: BILLING_PRIMARY_COLOR; text-decoration: none; font-weight: 600; }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <h1>BILLING_COMPANY_NAME</h1>
      <p>Sign in to your account</p>
    </div>
    
    <div class="content">
      $(if error)
      <div class="alert">$(error)</div>
      $(endif)
      
      <div class="tabs">
        <a href="login.html" class="tab tab-inactive">Buy Package</a>
        <div class="tab tab-active">I have Account</div>
      </div>
      
      <form name="login" action="$(link-login-only)" method="post" onsubmit="return doLogin()">
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
        <input type="hidden" name="mac" value="$(mac)" />
        
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" value="$(username)" placeholder="Username" autofocus />
        </div>
        
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" />
        </div>
        
        <button type="submit" class="btn-login">Connect Now</button>
      </form>
    </div>
    
    <div class="footer">
      <p>Need help? <a href="tel:BILLING_SUPPORT_PHONE">BILLING_SUPPORT_PHONE</a></p>
      <p style="margin-top: 8px;">&copy; 2025 BILLING_COMPANY_NAME</p>
    </div>
  </div>

  <script src="md5.js"></script>
  <script>
    // SECURITY FIX: previously this returned `true` (submitting the plaintext
    // password via a normal form POST) whenever chap-id was unavailable. That
    // silently allowed cleartext-over-HTTP submissions if RouterOS negotiated
    // http-pap or if JS partially failed. We now REQUIRE either:
    //   (a) an active HTTPS connection (encrypted transport), OR
    //   (b) a valid CHAP challenge (hashed password, never sent in the clear).
    // If neither is available, we block submission and show an error instead
    // of silently leaking the password.
    function doLogin() {
      var f = document.forms['login'];
      var isHttps = window.location.protocol === 'https:';
      var hasChap = typeof hexMD5 !== 'undefined' && '$(chap-id)' !== '';

      if (hasChap) {
        var newpass = hexMD5('$(chap-id)' + f.password.value + '$(chap-challenge)');
        var sendForm = document.createElement('form');
        sendForm.method = 'post';
        sendForm.action = '$(link-login-only)';
        sendForm.innerHTML = '<input type="hidden" name="username" value="' + f.username.value + '" />' +
                             '<input type="hidden" name="password" value="' + newpass + '" />' +
                             '<input type="hidden" name="dst" value="' + f.dst.value + '" />' +
                             '<input type="hidden" name="popup" value="true" />' +
                             '<input type="hidden" name="mac" value="' + (f.mac ? f.mac.value : '$(mac)') + '" />';
        document.body.appendChild(sendForm);
        sendForm.submit();
        return false;
      }

      if (isHttps) {
        // Transport is encrypted end-to-end (TLS) — plain POST is safe here.
        return true;
      }

      // Neither CHAP nor HTTPS available: refuse to send the password in the clear.
      var alertBox = document.querySelector('.alert');
      if (!alertBox) {
        alertBox = document.createElement('div');
        alertBox.className = 'alert';
        f.parentNode.insertBefore(alertBox, f);
      }
      alertBox.textContent = 'Secure login unavailable on this connection. Please reconnect to the WiFi and try again, or contact support.';
      return false;
    }
  </script>
</body>

</html>
