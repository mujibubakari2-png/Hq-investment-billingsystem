<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - BILLING_COMPANY_NAME</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, BILLING_PRIMARY_COLOR22, BILLING_ACCENT_COLOR22);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: #fff; width: 90%; max-width: 400px;
            border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden; text-align: center;
        }
        .header {
            background: linear-gradient(135deg, #e53935, #c62828);
            padding: 30px 20px; color: #fff;
        }
        .status-icon {
            width: 60px; height: 60px; background: rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; font-size: 30px;
        }
        .content { padding: 30px 24px; }
        .error-message {
            background: #fee2e2; color: #ef4444; padding: 15px;
            border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem;
            border: 1px solid #fca5a5; line-height: 1.4;
        }
        .info-row {
            display: flex; justify-content: space-between; padding: 10px 0;
            border-bottom: 1px solid #f0f0f0; font-size: 0.85rem;
        }
        .info-row:last-of-type { border-bottom: none; }
        .label { color: #666; }
        .value { color: #1a1a2e; font-weight: 600; }
        
        .btn-back {
            display: block; width: 100%; padding: 14px; margin-top: 25px;
            background: #1a1a2e; color: #fff; text-decoration: none;
            border-radius: 12px; font-weight: 700; font-size: 0.95rem;
            transition: all 0.2s;
        }
        .btn-back:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="status-icon">⚠</div>
            <h2>Oops!</h2>
            <p style="opacity: 0.8; font-size: 0.85rem; margin-top: 5px;">Something went wrong</p>
        </div>
        <div class="content">
            <div class="error-message">
                $(error)
            </div>
            
            <div class="info-row">
                <span class="label">IP Address</span>
                <span class="value">$(ip)</span>
            </div>
            <div class="info-row">
                <span class="label">MAC Address</span>
                <span class="value">$(mac)</span>
            </div>

            <a href="$(link-login)" class="btn-back">← Back to Login</a>
        </div>
    </div>
</body>
</html>
