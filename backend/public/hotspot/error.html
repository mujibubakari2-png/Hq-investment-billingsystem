<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HQINVESTMENT WiFi – Hitilafu</title>
<link rel="icon" href="assets/img/favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="assets/img/favicon.ico">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24"><path d="M1 6l11 8 11-8V5L12 13 1 5v1zm0 3v9a1 1 0 001 1h20a1 1 0 001-1V9l-11 8L1 9z"/></svg>
    </div>
    <h1>HQINVESTMENT WiFi</h1>
    <p>Hitilafu Imetokea</p>
  </div>
  <div class="card-body">
    <div class="alert alert-error">
      <span>⚠</span>
      <div>
        <strong>$(error)</strong>
        <p style="margin-top:4px;font-size:.8rem;">Tafadhali jaribu tena au wasiliana na msaada.</p>
      </div>
    </div>
    <div class="info-row">
      <span class="info-label">Mtumiaji</span>
      <span class="info-value">$(username)</span>
    </div>
    <div class="info-row">
      <span class="info-label">IP Address</span>
      <span class="info-value">$(ip)</span>
    </div>
    <a href="$(link-login)" class="btn btn-primary mt-18 d-block" style="text-decoration:none;">
      ← Rudi Kurasa ya Kuingia
    </a>
  </div>
  <div class="card-footer">
    <p>Msaada: <a href="tel:+255000000000">+255 000 000 000</a> &nbsp;|&nbsp; <a href="faqs.html">Maswali</a></p>
  </div>
</div>
</body>
</html>
