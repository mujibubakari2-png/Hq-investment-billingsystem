<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HQINVESTMENT WiFi – Umetenganishwa</title>
<link rel="icon" href="assets/img/favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="assets/img/favicon.ico">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24"><path d="M1 6l11 8 11-8V5L12 13 1 5v1zm0 3v9a1 1 0 001 1h20a1 1 0 001-1V9l-11 8L1 9z"/></svg>
    </div>
    <h1>HQINVESTMENT WiFi</h1>
    <p>Umetoka kwenye mtandao</p>
  </div>
  <div class="card-body">
    <div class="status-box" style="background:#fff7ed;border-color:#fed7aa;">
      <div class="status-icon">👋</div>
      <h2 style="color:#c2410c;">Umefanikiwa Kutoka</h2>
      <p>Asante kwa kutumia HQINVESTMENT WiFi. Karibu tena!</p>
    </div>
    <div class="info-row">
      <span class="info-label">Mtumiaji</span>
      <span class="info-value">$(username)</span>
    </div>
    <div class="info-row">
      <span class="info-label">IP Address</span>
      <span class="info-value">$(ip)</span>
    </div>
    <div class="info-row">
      <span class="info-label">MAC Address</span>
      <span class="info-value">$(mac)</span>
    </div>
    <a href="$(link-login)" class="btn btn-primary mt-18 d-block" style="text-decoration:none;">
      🔒 Ingia Tena
    </a>
  </div>
  <div class="card-footer">
    <p>&copy; 2025 HQINVESTMENT ISP &nbsp;|&nbsp; <a href="faqs.html">Msaada</a></p>
  </div>
</div>
</body>
</html>
