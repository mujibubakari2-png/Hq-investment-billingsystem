# Railway deployment configuration for the backend service.

[build]
  builder = "nixpacks"
  buildCommand = "pnpm install && pnpm build"

[deploy]
  startCommand = "npx prisma migrate deploy --skip-verify || true && npx tsx scripts/seed.ts || true && pnpm start"
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 5
