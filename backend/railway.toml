# Railway deployment configuration for the backend service.

[build]
  builder = "nixpacks"
  buildCommand = "pnpm install --no-frozen-lockfile && pnpm exec prisma generate && pnpm build"

[deploy]
  startCommand = "bash scripts/railway-start.sh"
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 5
  
  # Health check settings
  healthcheckPath = "/api/health"
  healthcheckTimeout = 45
  healthcheckInterval = 30
  # Allow more time for initial startup (migrations + seeding)
  serviceName = "backend"
