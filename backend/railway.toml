# Railway deployment configuration for the backend service.

[build]
  builder = "nixpacks"
  buildCommand = "pnpm install && pnpm build"

[deploy]
  nixpacksPlan = { "phases" = { "install" = { "dependsOn" = ["setup"] }, "build" = { "dependsOn" = ["install"] }, "start" = { "dependsOn" = ["build"] } } }
  startCommand = "echo '🚀 Starting Railway deployment...' && echo '📋 Checking DATABASE_URL...' && if [ -z \"$DATABASE_URL\" ]; then echo '❌ DATABASE_URL not set - exiting'; exit 1; else echo '✅ DATABASE_URL is set'; fi && echo '🔧 Generating Prisma client...' && npx prisma generate && echo '🗄️ Running database migrations...' && npx prisma migrate deploy --skip-verify && echo '🔍 Verifying migrations...' && node scripts/check-migrations.js && echo '🌱 Seeding database...' && npx tsx scripts/seed.ts && echo '🧪 Testing database connection...' && node scripts/test-db.js && echo '🚀 Starting application...' && pnpm start"
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 5
  healthcheckPath = "/api/health"
  healthcheckTimeout = 300
