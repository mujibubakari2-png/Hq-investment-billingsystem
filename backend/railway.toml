# Railway deployment configuration for the backend service.

[build]
  builder = "nixpacks"
  buildCommand = "pnpm install && pnpm build"

[deploy]
  nixpacksPlan = { "phases" = { "install" = { "dependsOn" = ["setup"] }, "build" = { "dependsOn" = ["install"] }, "start" = { "dependsOn" = ["build"] } } }
  startCommand = "npx prisma generate && npx prisma migrate deploy --skip-verify && npx tsx scripts/seed.ts && node scripts/test-db.js && pnpm start"
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 5
  healthcheckPath = "/api/health"
  healthcheckTimeout = 300
