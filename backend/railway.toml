# Railway deployment configuration for the backend service.

[build]
  builder = "nixpacks"
  buildCommand = "pnpm install --no-frozen-lockfile && pnpm exec prisma generate && pnpm build"

[deploy]
  nixpacksPlan = { "phases" = { "install" = { "dependsOn" = ["setup"] }, "build" = { "dependsOn" = ["install"] }, "start" = { "dependsOn" = ["build"] } } }
  startCommand = "echo '🚀 Starting Railway deployment...' && echo '📋 Checking DATABASE_URL...' && if [ -z \"$DATABASE_URL\" ]; then echo '❌ DATABASE_URL not set - exiting'; exit 1; fi && echo '🔧 Syncing database schema...' && (pnpm exec prisma db push --accept-data-loss || pnpm exec prisma migrate deploy --skip-verify) && echo '🌱 Seeding database...' && pnpm exec tsx scripts/seed.ts && echo '✅ Database ready' && echo '🚀 Starting Next.js application...' && PORT=${PORT:-3000} NODE_ENV=production pnpm start"
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 5
  healthcheckPath = "/api/health"
  healthcheckTimeout = 30
  healthcheckInterval = 60

[environments.production.variables]
  NODE_ENV = "production"
  PORT = "3000"
  NODE_OPTIONS = "--max-old-space-size=512"
