[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm && pnpm install --no-frozen-lockfile && npx prisma generate && pnpm run build"

[build.env]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "22"
PNPM_VERSION = "9.15.0"
RAILPACK_NODE_VERSION = "22"
NIXPACKS_INSTALL_CMD = "pnpm install --no-frozen-lockfile"

[deploy]
# Next.js server: must bind to 0.0.0.0 and Railway's $PORT
# Using shell expansion ${PORT:-3001} as a safe fallback
startCommand = "pnpm run start -- --hostname 0.0.0.0 --port ${PORT:-3001}"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.env]
CORS_ORIGIN = "https://hq-frontend.up.railway.app"
NEXT_PUBLIC_APP_URL = "https://hq-frontend.up.railway.app"
NODE_ENV = "production"

