# Railway multi-service configuration
# This file defines 3 services: backend, frontend, and landing-page
# Updated: 2026-04-16

[[services]]
id = "backend"
source = { repo = ".", path = "backend" }

[services.build]
builder = "NIXPACKS"

[services.build.env]
NODE_ENV = "production"

[services.deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[services.env]
# Database
DATABASE_URL = "postgresql://postgres:postgres@localhost:5432/kenge_isp"

# Authentication
JWT_SECRET = "kenge-isp-secret-key-change-in-production-2026"
GOOGLE_CLIENT_ID = ""
AUTOMATION_KEY = "dev-automation-key"

# Email (optional - for notifications)
SMTP_HOST = "smtp.gmail.com"
SMTP_PORT = "587"
SMTP_SECURE = "false"
SMTP_USER = ""
SMTP_PASS = ""
SMTP_FROM = "noreply@yourdomain.com"

# CORS and URLs
CORS_ORIGIN = "*"
NEXT_PUBLIC_APP_URL = "http://localhost:5173/"

# Cron jobs
CRON_SECRET = "your-cron-secret-here"

[[services]]
id = "frontend"
source = { repo = ".", path = "frontend" }

[services.build]
builder = "NIXPACKS"

[services.build.env]
NODE_ENV = "production"

[services.deploy]
startCommand = "npm run preview -- --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[services.env]
# API URL - Update with your backend service URL
VITE_API_URL = ""

# Google OAuth
VITE_GOOGLE_CLIENT_ID = ""

# Build settings
NODE_ENV = "production"

[[services]]
id = "landing-page"
source = { repo = ".", path = "landing-page" }

[services.build]
builder = "NIXPACKS"

[services.build.env]
NODE_ENV = "production"

[services.deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[services.env]
# Landing page specific env vars (if any)
NODE_ENV = "production"