# Railway repository deployment configuration for the landing-page service.
# Replace project/service values once Railway has linked the repository.
project = "YOUR_RAILWAY_PROJECT_ID"
service = "YOUR_SERVICE_ID"
branch = "master"

[build]
  command = "pnpm install --no-frozen-lockfile && pnpm build"
  root = "landing-page"

[deploy]
  command = "pnpm start"
