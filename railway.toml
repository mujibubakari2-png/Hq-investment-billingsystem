[build]
builder = "NIXPACKS"
buildCommand = "cd backend && npx prisma generate && pnpm run build"

[build.env]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "24.0.0"
PNPM_VERSION = "9.15.0"
RAILPACK_NODE_VERSION = "24.0.0"
NIXPACKS_INSTALL_CMD = "pnpm install --no-frozen-lockfile"

[deploy]
# Backend service: bind to 0.0.0.0 and Railway's $PORT.
# Use the backend package's next start command and let Railway set PORT.
startCommand = "cd backend && pnpm run start -- --hostname 0.0.0.0 --port ${PORT:-3001}"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
