[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm && pnpm install --no-frozen-lockfile && cd backend && npx prisma generate && pnpm run build"

[build.env]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "20.19.0"

[deploy]
# Backend service: bind to 0.0.0.0 and Railway's $PORT.
# Use the backend package's next start command and let Railway set PORT.
startCommand = "cd backend && pnpm run start -- --hostname 0.0.0.0 --port ${PORT:-3001}"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
