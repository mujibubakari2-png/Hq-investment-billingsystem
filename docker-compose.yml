services:
  postgres:
    image: postgres:16-alpine
    container_name: hqinvestment-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hqinvestment_user}
      # IMPORTANT: Define POSTGRES_PASSWORD in your root .env file!
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hqinvestment_password_replace_me}
      POSTGRES_DB: ${POSTGRES_DB:-hqinvestment_isp}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis — required by mikrotik-worker and radius-worker (BullMQ queues)
  # No password in dev (localhost only). Use docker-compose.prod.yml for production.
  redis:
    image: redis:7-alpine
    container_name: hqinvestment-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy volatile-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
