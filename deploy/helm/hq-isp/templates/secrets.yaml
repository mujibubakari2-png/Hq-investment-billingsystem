apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: hq-isp
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  DATABASE_URL: {{ printf "postgresql://hqadmin:%s@%s-postgres:5432/hq_isp?schema=public" .Values.secrets.databasePassword .Release.Name | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.databasePassword | b64enc | quote }}
  JWT_ACCESS_SECRET: {{ .Values.secrets.jwtAccessSecret | b64enc | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret | b64enc | quote }}
  FIELD_ENCRYPTION_KEY: {{ .Values.secrets.fieldEncryptionKey | b64enc | quote }}
  CRON_SECRET: {{ .Values.secrets.cronSecret | b64enc | quote }}
