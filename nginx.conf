# ── Rate limit zones ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
# Requires SSL certificates — run: sudo certbot --nginx -d yourdomain.com
server {
    listen 80;
    server_name _;

    # Drop direct IP access (SEO fix: Google will remove IP from search)
    if ($host ~* "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$") {
        return 444;
    }

    return 301 https://$host$request_uri;
}

# ── HTTPS server block ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # Drop direct IP access (SEO fix: Google will remove IP from search)
    if ($host ~* "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$") {
        return 444;
    }

    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Common security headers ───────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-src https://accounts.google.com;" always;

    # ── Drop malicious Next.js Server Action scanners ─────────────────────────
    if ($http_next_action) {
        return 444;
    }

    # ── 1. Landing Page — owns the root / ─────────────────────────────────────
    # Handles /, /features, /pricing, /about, and all landing slug pages.
    # Users see the landing page first when they open the site.
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # Landing page Next.js static assets
    location /_next/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── 2. Hotspot Portal ─────────────────────────────────────────────────────
    location /hotspot/ {
        proxy_pass http://127.0.0.1:3000/hotspot/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_hide_header X-Frame-Options;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── 3. Backend API — auth endpoints with stricter rate limits ─────────────
    proxy_intercept_errors on;
    error_page 502 503 504 = @api_error;

    location ~ ^/api/auth/(login|register|forgot-password) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # JSON error when backend is down
    location @api_error {
        default_type application/json;
        return 503 '{"error":"Service temporarily unavailable. Backend may be starting up."}';
    }

    # ── 4. Billing System SPA — accessed directly via /billing/ ───────────────
    # Serve the Vite build output (frontend/dist) from /var/www/html/billing.
    # The `alias` directive maps the request path to the actual filesystem path.
    location /billing/ {
        alias /var/www/html/billing/;   # adjust if needed
        index index.html;
        try_files $uri $uri/ /billing/index.html;
        # Long‑term caching for static assets (JS, CSS, images, fonts, etc.)
        location ~* \.(js|css|png|jpg|jpeg|svg|webp|ico|gif|ttf|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Prevent caching of the SPA entry point so new deployments are reflected immediately
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
