# ── Rate limit zones ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

# ── HTTP → HTTPS redirect (E01 FIX: was commented out) ───────────────────────
# Requires SSL certificates — run: sudo certbot --nginx -d yourdomain.com
server {
    listen 80;
    server_name _;
    # Redirect ALL HTTP traffic to HTTPS (E01)
    return 301 https://$host$request_uri;
}

# ── HTTPS server block (E02 FIX: removed orphaned duplicate blocks) ───────────
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Common security headers ───────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # E24 FIX: Removed 'unsafe-eval'. Use nonces instead of 'unsafe-inline' in future.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-src https://accounts.google.com;" always;

    # ── Drop malicious Next.js Server Action scanners ─────────────────────────
    # Since we do not use Server Actions, any request with Next-Action header
    # is a bot scanning for vulnerabilities which can crash Next.js processes.
    if ($http_next_action) {
        return 444;
    }

    # ── 1. Landing Page ───────────────────────────────────────────────────────
    # Moved to /landing to allow Billing System to own the root (/)
    location /landing {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # Landing page Next.js static assets
    location /_next/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── 2. Hotspot Portal ─────────────────────────────────────────────────────
    location /hotspot/ {
        proxy_pass http://127.0.0.1:3000/hotspot/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_hide_header X-Frame-Options;
        # Hotspot is called from captive portal — restrict origin, not wildcard
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── 3. Backend API — auth endpoints with stricter rate limits ─────────────
    proxy_intercept_errors on;
    error_page 502 503 504 = @api_error;

    location ~ ^/api/auth/(login|register|forgot-password) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # JSON error when backend is down
    location @api_error {
        default_type application/json;
        return 503 '{"error":"Service temporarily unavailable. Backend may be starting up."}';
    }

    # ── 4. Frontend Billing System (SPA) ──────────────────────────────────────
    # NOTE: /assets/ must come before the catch-all location / below.
    # This block takes precedence because nginx uses longest-prefix matching.
    location /assets/ {
        root /var/www/html/billing;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        root /var/www/html/billing;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
}
