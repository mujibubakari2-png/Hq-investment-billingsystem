server {
    listen 80;
    server_name _;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── 1. Landing Page (Root "/" and slug pages) ─────────────────────────────
    location = / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Landing page Next.js assets
    location /_next/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── 2. Hotspot Portal ─────────────────────────────────────────────────────
    location /hotspot/ {
        proxy_pass http://127.0.0.1:3000/hotspot/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_hide_header X-Frame-Options;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── 3. Backend API ────────────────────────────────────────────────────────
    proxy_intercept_errors on;
    error_page 502 503 504 = @api_error;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # JSON error when backend is down
    location @api_error {
        default_type application/json;
        return 503 '{"error":"Service temporarily unavailable. Backend may be starting up."}';
    }

    # ── 4. Frontend Billing System ────────────────────────────────────────────
    # Serve static build files directly (fastest — no process needed)
    location /assets/ {
        root /var/www/html/billing;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        # Try static files first, fallback to index.html (SPA routing)
        root /var/www/html/billing;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
}
