# =============================================================================
# /etc/nginx/nginx.conf  —  Global Nginx Configuration
# HQ Investment Billing System — Production
# =============================================================================
# Deploy:  sudo cp nginx.conf /etc/nginx/nginx.conf
#          sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

user www-data;
worker_processes auto;                    # one worker per CPU core
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;              # max concurrent connections per worker
    multi_accept on;
    use epoll;                            # most efficient I/O on Linux
}

http {

    # ── Basic Settings ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;              # hide Nginx version from responses
    client_max_body_size 50M;           # allow file uploads up to 50 MB
    client_body_timeout 30s;
    client_header_timeout 15s;

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main buffer=16k;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── Rate Limiting Zones ───────────────────────────────────────────────────
    # auth    — 5 req/min  (login, register, forgot-password)
    # api     — 60 req/min (general API)
    # general — 100 req/min (static pages, SPA shell)
    limit_req_zone  $binary_remote_addr zone=auth:10m    rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=api:10m     rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=general:10m rate=100r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Proxy Cache (optional — for read-heavy API routes) ────────────────────
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=app_cache:10m
                     max_size=1g inactive=60m use_temp_path=off;

    # ── Global SSL Settings ───────────────────────────────────────────────────
    # Individual certs are set per-vhost by Certbot.
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── Include Virtual Hosts ─────────────────────────────────────────────────
    include /etc/nginx/sites-enabled/*;
}
