server {
    listen 80;
    server_name your-domain.com; # Replace with your domain or IP

    # Landing Page (Root)
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Frontend Service (Login, Register, Dashboard, etc.)
    location ~ ^/(login|register|dashboard|dashboard/|recharge|profile|clients|active-subscribers|expired-subscribers|packages|voucher-codes|all-transactions|mobile-transactions|expense-tracking|mikrotiks|vpn-management|equipments|sms-messages|message-templates|send-bulk-message|system-settings|payment-channels|system-users|license-management|reports|tutorial-videos|technical-support) {
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
