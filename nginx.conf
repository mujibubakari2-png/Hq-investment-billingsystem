server {
    listen 80;
    server_name _;

    # ── 1. Landing Page (Root "/" only) ──────────────────────────────────────
    location = / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── 2. Next.js Assets for Landing Page ───────────────────────────────────
    location /_next/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── 3. Backend API — MUST come before the catch-all "/" ──────────────────
    # Intercept upstream errors so JSON is never replaced with HTML
    proxy_intercept_errors on;
    error_page 502 503 504 = @api_error;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Return JSON error when the backend is down — never serve HTML for /api
    location @api_error {
        default_type application/json;
        return 503 '{"error":"Service temporarily unavailable. Backend may be starting up."}';
    }

    # ── 4. Frontend Billing System (static build) ─────────────────────────────
    location / {
        root /var/www/html/billing;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
