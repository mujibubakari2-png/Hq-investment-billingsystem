server {
    listen 80;
    server_name _;

    # 1. Landing Page (Root only)
    location = / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Next.js Assets for Landing Page
    location /_next {
        proxy_pass http://localhost:3001;
    }

    # 3. Backend API
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 4. Frontend Billing System (Login, Register, Dashboard, etc.)
    location / {
        # Serve static files directly for better performance and reliability
        root /root/Hq-investment-billingsystem/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Fallback to PM2 if static file not found
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 5. Vite Static Assets
    location /assets/ {
        alias /root/Hq-investment-billingsystem/frontend/dist/assets/;
        access_log off;
        expires max;
    }
}
