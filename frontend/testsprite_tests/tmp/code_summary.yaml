version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: React
  - build_tool: Vite
  - routing: React Router DOM
  - state_management: Zustand
  - styling: Emotion, Material UI
  - validation: Zod
  - form_handling: React Hook Form
routes:
  - path: /login
    file: src/pages/Login.tsx
    auth_required: false
    description: User login page
  - path: /register
    file: src/pages/Register.tsx
    auth_required: false
    description: User registration page
  - path: /forgot-password
    file: src/pages/ForgotPassword.tsx
    auth_required: false
    description: Password recovery page
  - path: /dashboard
    file: src/pages/Dashboard.tsx
    auth_required: true
    description: System overview and statistics dashboard
  - path: /clients
    file: src/pages/Clients.tsx
    auth_required: true
    description: Client management and listing
  - path: /packages
    file: src/pages/Packages.tsx
    auth_required: true
    description: Service package management
  - path: /all-transactions
    file: src/pages/AllTransactions.tsx
    auth_required: true
    description: Financial transaction logs
  - path: /mikrotiks
    file: src/pages/Mikrotiks.tsx
    auth_required: true
    description: Router and network equipment management
features:
  - name: User Authentication
    description: User login with username and password
    files:
      - src/pages/Login.tsx
      - src/stores/authStore.ts
    entry_route: /login
    user_interactions:
      - Fill username input
      - Fill password input
      - Click Sign In button
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: Client Management
    description: Create and manage ISP clients
    files:
      - src/pages/Clients.tsx
      - src/modals/AddClientModal.tsx
    entry_route: /clients
    user_interactions:
      - Click Add Client button
      - Fill client details form
      - Click Save button
    api_calls:
      - method: POST
        endpoint: /api/clients
      - method: GET
        endpoint: /api/clients
    auth_required: true
  - name: Dashboard Overview
    description: View system-wide metrics and charts
    files:
      - src/pages/Dashboard.tsx
    entry_route: /dashboard
    user_interactions:
      - View revenue charts
      - Filter dashboard by router
    api_calls:
      - method: GET
        endpoint: /api/dashboard
    auth_required: true
known_limitations: []
