server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript
        application/json application/xml application/rss+xml
        image/svg+xml font/woff font/woff2;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"          always;
    add_header X-Content-Type-Options    "nosniff"             always;
    add_header X-XSS-Protection          "1; mode=block"       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Static asset caching ──────────────────────────────────────────────────
    # Vite hashes filenames — safe to cache aggressively
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health endpoint (for Docker HEALTHCHECK) ──────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SPA fallback: all unknown routes → index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API requests to backend ─────────────────────────────────────────
    location /api/ {
        # This points to the PM2 backend running on the same server.
        # If using Docker compose, you might need to change this to http://backend:3000/api/
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
