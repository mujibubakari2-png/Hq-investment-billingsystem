[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm run build"

[build.env]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "20.19.0"

[deploy]
# Vite preview server: must bind to 0.0.0.0 and Railway's $PORT
# Using shell expansion ${PORT:-4173} as a safe fallback
startCommand = "pnpm run preview -- --host 0.0.0.0 --port ${PORT:-4173}"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.env]
VITE_API_URL = "https://hq-backend.up.railway.app"
NODE_ENV = "production"
